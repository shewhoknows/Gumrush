<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#FDEDD4" />
<title>Quibble — 7 questions. Endless battles.</title>
<style>
:root{
  --cream:#FDEDD4; --red:#F20815; --green:#11A253; --pink:#FCA4E0;
  --blue:#155FCC; --ink:#111111; --orange:#FE5F0B; --dgreen:#317653;
  --peach:#F7AB54; --spink:#FA97C2; --sblue:#A3BDF1; --yellow:#FCCA59;
  --purple:#A78BFA; --paper:#FFF8EC; --muted:#5B5347;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--cream); color:var(--ink);
  touch-action:manipulation; -webkit-user-select:none; user-select:none;
  overscroll-behavior-y:none;
}
#app{max-width:430px;margin:0 auto;min-height:100dvh;position:relative}

h1,h2,h3{font-weight:900;letter-spacing:-.03em;line-height:1.08}
.muted{color:var(--muted);font-weight:700;font-size:.85rem}
.tiny{font-size:.72rem;font-weight:700;color:var(--muted)}

.screen{padding:max(18px,env(safe-area-inset-top)) 18px 120px;min-height:100dvh;animation:in .25s cubic-bezier(.2,.9,.3,1.15)}
.screen.notabs{padding-bottom:36px}
@keyframes in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.row{display:flex;align-items:center;gap:12px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:12px}
.center{text-align:center}
.mt8{margin-top:8px}.mt14{margin-top:14px}.mt20{margin-top:20px}

.card{background:var(--paper);border:3px solid var(--ink);border-radius:22px;box-shadow:5px 5px 0 var(--ink);padding:16px}
.card.sm{box-shadow:3px 3px 0 var(--ink);border-width:2.5px;border-radius:18px;padding:13px}
.tap{transition:transform .08s,box-shadow .08s;cursor:pointer}
.tap:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)!important}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font:inherit;font-weight:900;font-size:1.02rem;letter-spacing:-.01em;
  border:3px solid var(--ink);border-radius:999px;box-shadow:4px 4px 0 var(--ink);
  padding:14px 24px;background:var(--yellow);color:var(--ink);cursor:pointer;
  transition:transform .08s,box-shadow .08s;
}
.btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
.btn.block{display:flex;width:100%}
.btn.big{padding:17px 28px;font-size:1.15rem}
.btn.green{background:var(--green);color:var(--paper)}
.btn.red{background:var(--red);color:var(--paper)}
.btn.blue{background:var(--blue);color:var(--paper)}
.btn.orange{background:var(--orange);color:var(--paper)}
.btn.white{background:var(--paper)}
.btn.ghost{background:transparent;box-shadow:none;border-color:transparent;color:var(--muted);font-weight:800}
.btn:disabled{opacity:.45;pointer-events:none}
.iconbtn{width:42px;height:42px;flex:none;border:3px solid var(--ink);border-radius:14px;
  background:var(--paper);box-shadow:3px 3px 0 var(--ink);font-size:1.05rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .08s,box-shadow .08s}
.iconbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

.chip{display:inline-flex;align-items:center;gap:6px;background:var(--paper);
  border:2.5px solid var(--ink);border-radius:999px;padding:6px 12px;
  font-weight:800;font-size:.78rem;box-shadow:2px 2px 0 var(--ink);white-space:nowrap}

.topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.topbar h2{flex:1;font-size:1.5rem}

.tabbar{
  position:fixed;left:0;right:0;margin-inline:auto;bottom:max(12px,env(safe-area-inset-bottom));
  width:min(394px,calc(100% - 36px));background:var(--ink);border-radius:999px;
  display:flex;justify-content:space-around;padding:7px;z-index:50;
  border:3px solid var(--ink);box-shadow:4px 4px 0 var(--ink);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;
  border-radius:999px;color:#cfc6b8;font-size:.58rem;font-weight:800;cursor:pointer;border:none;background:transparent;font-family:inherit}
.tab svg{width:21px;height:21px}
.tab.on{background:var(--yellow);color:var(--ink)}

.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.tcard{position:relative;border:3px solid var(--ink);border-radius:20px;
  box-shadow:4px 4px 0 var(--ink);padding:14px 12px;cursor:pointer;
  transition:transform .08s,box-shadow .08s;background:var(--paper);
  display:flex;flex-direction:column;align-items:center;text-align:center}
.tcard:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
.tcard .tn{font-weight:900;font-size:.98rem;margin-top:8px;width:100%}
.tcard .tm{font-size:.7rem;font-weight:700;color:var(--muted);margin-top:1px;width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tcard .sel{position:absolute;top:9px;right:9px;width:25px;height:25px;
  background:var(--green);color:#fff;border:2.5px solid var(--ink);border-radius:999px;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem}

.qdots{display:flex;gap:7px;justify-content:center}
.qdot{width:13px;height:13px;border-radius:999px;border:2.5px solid var(--ink);background:var(--paper);transition:transform .15s}
.qdot.r{background:var(--green)}
.qdot.w{background:var(--red)}
.qdot.cur{background:var(--yellow);transform:scale(1.25)}
.timerwrap{height:19px;border:3px solid var(--ink);border-radius:999px;background:var(--paper);overflow:hidden;box-shadow:3px 3px 0 var(--ink)}
.timerbar{height:100%;background:var(--green);border-radius:999px}
.timerbar.warn{background:var(--orange)}
.timerbar.danger{background:var(--red)}
.qcard{background:var(--paper);border:3px solid var(--ink);border-radius:22px;
  box-shadow:5px 5px 0 var(--ink);padding:22px 18px;min-height:124px;display:flex;align-items:center;justify-content:center;text-align:center}
.qcard h3{font-size:1.18rem;line-height:1.3}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  font:inherit;font-weight:800;font-size:.95rem;background:var(--paper);color:var(--ink);
  border:3px solid var(--ink);border-radius:17px;box-shadow:3px 3px 0 var(--ink);
  padding:14px;cursor:pointer;transition:transform .08s,box-shadow .08s}
.opt:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
.opt .key{width:29px;height:29px;flex:none;border:2.5px solid var(--ink);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.76rem;background:var(--cream)}
.opt.ok{background:var(--green);color:#fff}
.opt.ok .key{background:var(--paper);color:var(--ink)}
.opt.bad{background:var(--red);color:#fff;animation:shake .4s}
.opt.bad .key{background:var(--paper);color:var(--ink)}
.opt.dim{opacity:.45}
.opt:disabled{pointer-events:none}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}

.scorepill{display:flex;align-items:center;gap:7px;border:2.5px solid var(--ink);border-radius:999px;
  padding:4px 12px 4px 5px;background:var(--paper);font-weight:900;font-size:.82rem;box-shadow:2px 2px 0 var(--ink);transition:background .2s,transform .2s}
.scorepill.hot{background:var(--yellow);transform:scale(1.07)}

.fbwrap{position:fixed;left:0;right:0;bottom:0;z-index:80;display:flex;justify-content:center;
  padding:0 18px max(18px,env(safe-area-inset-bottom));pointer-events:none}
.fbcard{width:100%;max-width:394px;background:var(--paper);border:3px solid var(--ink);
  border-radius:22px;box-shadow:6px 6px 0 var(--ink);padding:14px;display:flex;gap:13px;align-items:center;
  animation:fbin .25s cubic-bezier(.2,.9,.3,1.3)}
@keyframes fbin{from{opacity:0;transform:translateY(30px) scale(.92)}to{opacity:1;transform:none}}
.fbpts{font-size:1.7rem;font-weight:900;letter-spacing:-.03em}

.banner{border:3px solid var(--ink);border-radius:26px;box-shadow:6px 6px 0 var(--ink);
  padding:22px 14px;text-align:center}
.xpline{display:flex;justify-content:space-between;font-weight:800;font-size:.9rem;padding:7px 0;border-bottom:2px dashed #d8cdb8}
.xpline:last-of-type{border-bottom:none}

.lbrow{display:flex;align-items:center;gap:11px;padding:10px 12px;border:2.5px solid var(--ink);
  border-radius:17px;background:var(--paper);box-shadow:3px 3px 0 var(--ink)}
.lbrow.me{background:var(--yellow)}
.lbrank{width:32px;height:32px;flex:none;border:2.5px solid var(--ink);border-radius:11px;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.85rem;background:var(--cream)}

.xpbarwrap{height:16px;border:2.5px solid var(--ink);border-radius:999px;background:var(--paper);overflow:hidden}
.xpbar{height:100%;background:var(--purple);border-radius:999px;transition:width .6s cubic-bezier(.2,.9,.3,1.2)}

.agrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ach{border:2.5px solid var(--ink);border-radius:17px;box-shadow:3px 3px 0 var(--ink);padding:13px;background:var(--paper)}
.ach.lock{opacity:.5;background:#efe5d2}
.ach .an{font-weight:900;font-size:.86rem;margin-top:7px}
.ach .ad{font-size:.7rem;font-weight:700;color:var(--muted);margin-top:2px}
.abadge{width:40px;height:40px;border-radius:999px;border:2.5px solid var(--ink);background:var(--yellow);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem}
.ach.lock .abadge{background:var(--cream)}

.week{display:flex;gap:7px}
.day{flex:1;text-align:center}
.day .dn{font-size:.6rem;font-weight:800;color:var(--muted)}
.day .dc{width:100%;height:42px;border:2.5px solid var(--ink);border-radius:12px;margin-top:4px;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;background:var(--paper);color:var(--muted)}
.day .dc.hit{background:var(--orange);color:#fff}
.day .dc.today{outline:3px solid var(--ink);outline-offset:2px}

#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:108px;z-index:99;
  background:var(--ink);color:var(--cream);font-weight:800;font-size:.86rem;
  padding:12px 20px;border-radius:999px;box-shadow:3px 3px 0 rgba(17,17,17,.3);
  animation:fbin .25s;max-width:86%;text-align:center}
.confetti{position:fixed;top:-24px;z-index:70;width:12px;height:12px;border:2px solid var(--ink);pointer-events:none;
  animation-name:fall;animation-timing-function:ease-in;animation-fill-mode:forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(740deg)}}

.pill{border:2.5px solid var(--ink);border-radius:999px;padding:4px 12px;font-weight:800;font-size:.76rem;display:inline-block}
.pill.good{background:var(--green);color:#fff}
.pill.bad{background:var(--red);color:#fff}
.pill.neutral{background:var(--cream)}

.statbox{flex:1;text-align:center;border:2.5px solid var(--ink);border-radius:15px;padding:11px 4px;background:var(--paper);box-shadow:2px 2px 0 var(--ink)}
.statbox .sv{font-weight:900;font-size:1.22rem}
.statbox .sl{font-size:.6rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}

input.namefield{font:inherit;font-weight:900;font-size:1.05rem;border:3px solid var(--ink);
  border-radius:14px;padding:11px 14px;width:100%;background:var(--paper);box-shadow:3px 3px 0 var(--ink);color:var(--ink)}
input.namefield:focus{outline:3px solid var(--blue);outline-offset:2px}
.swatch{width:36px;height:36px;border-radius:999px;border:2.5px solid var(--ink);cursor:pointer;display:inline-block}
.swatch.sel{outline:3.5px solid var(--ink);outline-offset:2.5px}

.bob{animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.wig{animation:wig .5s ease-in-out infinite}
@keyframes wig{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.spinb{animation:spinb 1.1s ease-in-out infinite}
@keyframes spinb{to{transform:rotate(360deg)}}
.cd{font-size:5.4rem;font-weight:900;letter-spacing:-.05em;animation:cd .78s ease-in-out infinite}
@keyframes cd{0%{transform:scale(.4);opacity:0}30%{transform:scale(1.12);opacity:1}85%{transform:scale(1)}100%{opacity:.4}}
.hscroll{display:flex;gap:13px;overflow-x:auto;padding:4px 4px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.hscroll .tcard{flex:0 0 150px}

/* annotation mode (design feedback) */
#annbtn{position:fixed;right:14px;bottom:max(88px,calc(env(safe-area-inset-bottom) + 76px));z-index:120;
  width:48px;height:48px;border-radius:999px;border:3px solid var(--ink);background:var(--yellow);
  box-shadow:3px 3px 0 var(--ink);font-size:1.15rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
#annbtn.on{background:var(--red)}
#annlayer{position:fixed;inset:0;z-index:110;background:rgba(242,8,21,.05)}
.annpin{position:fixed;z-index:115;width:30px;height:30px;margin:-15px 0 0 -15px;border-radius:999px;
  background:var(--red);color:#fff;border:2.5px solid var(--ink);box-shadow:2px 2px 0 var(--ink);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;cursor:pointer}
#anntools{position:fixed;left:50%;transform:translateX(-50%);bottom:max(14px,env(safe-area-inset-bottom));
  z-index:120;display:flex;gap:8px;background:var(--ink);padding:8px;border-radius:999px}
#anntools button{font:inherit;font-weight:900;font-size:.78rem;padding:9px 14px;border-radius:999px;
  border:2.5px solid var(--ink);background:var(--paper);cursor:pointer}
#annhint{position:fixed;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:120;
  background:var(--ink);color:var(--cream);font-weight:800;font-size:.76rem;padding:8px 16px;border-radius:999px;
  max-width:88%;text-align:center}
</style>
</head>

function pad(n){return n<10?'0'+n:''+n}
function dkey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function todayKey(){return dkey(new Date())}
function yesterdayKey(){const d=new Date();d.setDate(d.getDate()-1);return dkey(d)}
function weekKey(){const d=new Date(),s=new Date(d.getFullYear(),0,1);
  return d.getFullYear()+'-W'+Math.ceil(((d-s)/864e5+s.getDay()+1)/7)}

/* deterministic rng for the daily challenge + weekly mock leaderboard */
function strSeed(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rng(seed){let a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function shuffled(arr,rand){const a=arr.slice();const r=rand||Math.random;
  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n){return shuffled(arr).slice(0,n)}

function dailySet(){
  const r=rng(strSeed(todayKey()));
  return shuffled(shuffled(TOPICS,r).slice(0,7).map(t=>{
    const q=QS[t.id][Math.floor(r()*QS[t.id].length)];
    return {tid:t.id,q:q[0],o:q[1],c:q[2]};
  }),r);
}
function mixedSet(){
  return sample(TOPICS,7).map(t=>{
    const q=QS[t.id][Math.floor(Math.random()*QS[t.id].length)];
    return {tid:t.id,q:q[0],o:q[1],c:q[2]};
  });
}
function topicSet(tid){
  return sample(QS[tid],7).map(q=>({tid,q:q[0],o:q[1],c:q[2]}));
}

function evalAch(){
  const newly=[];
  const has=id=>S.ach.includes(id);
  const give=(id,cond)=>{if(cond&&!has(id)){S.ach.push(id);newly.push(ACH.find(a=>a.id===id))}};
  give('first_win',wins()>=1);
  give('perfect7',S.history.some(r=>r.answers.length&&r.answers.every(a=>a.yi===a.ci)));
  give('wins5',wins()>=5);
  give('wins25',wins()>=25);
  give('matches10',S.history.length>=10);
  give('speedy',S.history.some(r=>r.out==='win'&&r.answers.length&&(r.answers.reduce((s,a)=>s+a.t,0)/r.answers.length)<4));
  give('bigbrain',bestScore()>=900);
  give('explorer',topicsPlayed()>=5);
  give('daily1',!!S.lastDaily);
  give('streak3',S.bestDailyStreak>=3);
  give('streak7',S.bestDailyStreak>=7);
  give('instigator',S.challengesSent>=1);
  return newly;
}

function confetti(){

/* ============================== GAME ENGINE ============================== */

let G=null;
const QTIME=10, FBTIME=1700;

function startMatch(mode,topic,opp,questions){
  G={mode,topic,tid:topic?topic.id:'mixed',tname:topic?topic.name:'Mixed Bag',
     opp,qs:questions,phase:'mm',idx:0,t:QTIME,
     you:{score:0,streak:0},bot:{score:0,streak:0,answered:false},
     plan:questions.map(()=>({c:Math.random()<opp.acc,t:opp.min+Math.random()*(opp.max-opp.min)})),
     answers:[],fb:null,cd:3,timer:null,summary:null};
  navStack.push(route);route={s:'match'};
  render();
  later(()=>{G.phase='found';render();
    later(()=>showCount(3),1500)},1700);
}
function showCount(n){
  if(n<1){G.phase='quiz';nextQuestion();return}
  G.phase='count';G.cd=n;render();
  later(()=>showCount(n-1),800);
}
function nextQuestion(){
  G.t=QTIME;G.bot.answered=false;G.fb=null;G.phase='quiz';
  render();
  G.timer=setInterval(()=>{
    if(!G||G.phase!=='quiz')return;
    G.t=Math.max(0,G.t-0.05);
    const bar=document.getElementById('tbar');
    if(bar){bar.style.width=(G.t/QTIME*100)+'%';
      bar.className='timerbar'+(G.t<=2.5?' danger':(G.t<=5?' warn':''))}
    const tn=document.getElementById('tnum');if(tn)tn.textContent=G.t.toFixed(1)+'s';
    if(!G.bot.answered&&(QTIME-G.t)>=G.plan[G.idx].t){
      G.bot.answered=true;
      const bp=document.getElementById('botpill');if(bp)bp.classList.add('hot');
    }
    if(G.t<=0)answer(null);
  },50);
}
function answer(i){
  if(!G||G.fb||G.phase!=='quiz')return;
  if(G.timer){clearInterval(G.timer);G.timer=null}
  const q=G.qs[G.idx];
  const correct=i===q.c;
  const timeTaken=i===null?QTIME:QTIME-G.t;
  G.you.streak=correct?G.you.streak+1:0;
  const base=correct?100:0;
  const speed=correct?Math.floor(G.t/QTIME*50):0;
  const stk=(correct&&G.you.streak>=3)?25:0;
  const pts=base+speed+stk;
  G.you.score+=pts;
  const plan=G.plan[G.idx];
  G.bot.streak=plan.c?G.bot.streak+1:0;
  let bp=0;
  if(plan.c){bp=100+Math.floor(Math.max(0,QTIME-plan.t)/QTIME*50)+(G.bot.streak>=3?25:0)}
  G.bot.score+=bp;
  G.answers.push({tid:q.tid,q:q.q,o:q.o,ci:q.c,yi:i,t:timeTaken,pts,speed,stk,bc:plan.c,bp});
  G.fb={correct,timedOut:i===null,base,speed,stk,total:pts,bc:plan.c};
  render();
  later(()=>{
    if(G.idx>=G.qs.length-1)finishMatch();
    else{G.idx++;nextQuestion()}
  },FBTIME);
}
function finishMatch(){
  const out=G.you.score>G.bot.score?'win':(G.you.score<G.bot.score?'loss':'draw');
  const lines=[];
  if(out==='win')lines.push(['Victory',120]);
  else if(out==='loss')lines.push(['Good fight',60]);
  else lines.push(['Dead heat',90]);
  const perfect=G.answers.every(a=>a.yi===a.ci);
  if(perfect)lines.push(['Perfect 7',50]);
  if(G.mode==='daily'&&S.lastDaily!==todayKey()){
    lines.push(['Daily challenge',50]);
    S.dailyStreak=(S.lastDaily===yesterdayKey())?S.dailyStreak+1:1;
    S.bestDailyStreak=Math.max(S.bestDailyStreak,S.dailyStreak);
    S.lastDaily=todayKey();
  }
  const total=lines.reduce((s,l)=>s+l[1],0);
  if(S.weekKey!==weekKey()){S.weekKey=weekKey();S.weeklyXP=0}
  S.xp+=total;S.weeklyXP+=total;
  const rec={id:Date.now()+'-'+Math.floor(Math.random()*1e6),date:Date.now(),mode:G.mode,
    tid:G.tid,tname:G.tname,opp:{name:G.opp.name,color:G.opp.color,m:G.opp.m},
    ys:G.you.score,os:G.bot.score,out,xp:total,answers:G.answers};
  S.history.unshift(rec);
  if(S.history.length>60)S.history.length=60;
  const newly=evalAch();
  save();
  G.summary={rec,lines,total,newly};
  navStack=[{s:'home'}];route={s:'results'};
  render();
  if(out==='win')confetti();
}
function rematch(){
  const qs=G.topic?topicSet(G.topic.id):mixedSet();
  startMatch(G.mode,G.topic,G.opp,qs);
}

  <button class="btn ghost block" style="margin-top:6px" onclick="Q.tab('home')">Back to home</button>
</div>`},

review(){
  const rec=S.history.find(r=>r.id===route.mid)||S.history[0];
  if(!rec)return SCREENS.home();
  const right=rec.answers.filter(a=>a.yi===a.ci).length;
  return `<div class="screen notabs">
  ${headerBack('Review Answers')}
  <div class="row" style="margin-bottom:14px">${chip(right+'/'+rec.answers.length+' correct',C.green)}
    ${chip('+'+rec.answers.reduce((s,a)=>s+a.pts,0)+' pts',C.yellow)}</div>
  ${rec.answers.map((a,i)=>`<div class="card sm" style="margin-bottom:12px">
    <div class="row" style="align-items:flex-start">
      <div style="width:26px;height:26px;flex:none;border-radius:999px;border:2.5px solid var(--ink);
        background:${a.yi===a.ci?C.green:C.red};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.78rem">${i+1}</div>
      <div style="font-weight:900;font-size:.92rem;line-height:1.35">${esc(a.q)}</div>
    </div>
    <div style="margin-top:9px"><span class="tiny">You:</span>
      <span class="pill ${a.yi===null?'neutral':(a.yi===a.ci?'good':'bad')}">${a.yi===null?'No answer':esc(a.o[a.yi])}</span></div>
    ${a.yi!==a.ci?`<div style="margin-top:6px"><span class="tiny">Right:</span> <span class="pill good">${esc(a.o[a.ci])}</span></div>`:''}
    <div class="spread" style="margin-top:9px">
      <span class="tiny">${a.bc?'✅':'❌'} ${esc(rec.opp.name)} ${a.bc?'+'+a.bp:'missed'}</span>
      <span class="tiny" style="color:${a.pts?C.dgreen:'var(--muted)'};font-weight:900">${a.t.toFixed(1)}s · +${a.pts} pts</span>
    </div>
  </div>`).join('')}
</div>`},

ranks(){
  const tab=route.tab||'week';
  let entries;
  if(tab==='friends'){
    entries=FRIENDS.map(f=>({name:f.name,color:f.color,xp:f.level*500-180,me:false}));
    entries.push({name:S.name,color:S.color,xp:S.xp,me:true});
  }else{
    entries=LB_SEEDS.map(([name,color,base])=>{
      const xp=tab==='week'?60+Math.floor(rng(strSeed(name+weekKey()))()*820):base;
      return {name,color,xp,me:false}});
    entries.push({name:S.name,color:S.color,xp:tab==='week'?S.weeklyXP:S.xp,me:true});
  }
  entries.sort((a,b)=>b.xp-a.xp);
  const myRank=entries.findIndex(e=>e.me)+1;
  const tabs=[['week','This Week'],['all','All Time'],['friends','Friends']];
  return `<div class="screen">
  <div class="topbar"><h2>Leaderboard</h2></div>
  <div class="row" style="margin-bottom:14px">
    ${tabs.map(([id,l])=>`<button class="btn" style="flex:1;padding:9px 4px;font-size:.78rem;box-shadow:2px 2px 0 var(--ink);
      background:${tab===id?C.yellow:C.paper}" onclick="Q.go2('ranks',{tab:'${id}'})">${l}</button>`).join('')}
  </div>
  <div class="card sm row" style="background:${C.pink};margin-bottom:14px">
    ${mascot(myRank<=3?'proud':'competitive',S.color,54)}
    <div><div style="font-weight:900;font-size:1.05rem">You’re #${myRank}</div>
      <div class="tiny">${myRank<=3?'Podium blob. Defend it.':'Win duels to climb the board.'}</div></div>
  </div>
  ${entries.map((e,i)=>`<div class="lbrow ${e.me?'me':''}" style="margin-bottom:9px">
    <div class="lbrank" style="background:${i===0?C.yellow:(i===1?C.sblue:(i===2?C.peach:C.cream))}">${i+1}</div>
    ${avatar(e.color,32,i===0?'proud':'neutral')}
    <div style="flex:1;font-weight:900;font-size:.92rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.name)}${e.me?' (you)':''}</div>
    <div class="tiny" style="font-weight:900">${e.xp} XP</div>
  </div>`).join('')}
  ${tabbar('ranks')}
</div>`},

activity(){return `<div class="screen">
  <div class="topbar"><h2>Activity</h2></div>
  ${S.pending.length?`<h3 style="margin-bottom:10px">Pending challenges</h3>
    ${S.pending.map(p=>`<div class="card sm" style="background:${C.yellow}99;margin-bottom:10px">
      <div class="row">${avatar(p.color,38,'thinking')}
        <div style="flex:1"><div style="font-weight:900;font-size:.9rem">${esc(p.fname)} · ${esc(p.tname)}</div>
        <div class="tiny">Waiting for them to play… (demo)</div></div></div>
      <div class="row" style="margin-top:10px">
        <button class="btn green" style="padding:9px 16px;font-size:.8rem" onclick="Q.playPending('${p.id}')">Play it now</button>
        <button class="btn white" style="padding:9px 16px;font-size:.8rem" onclick="Q.dismissPending('${p.id}')">Dismiss</button>
      </div></div>`).join('')}`:''}
  <h3 style="margin:${S.pending.length?'16px':'0'} 0 10px">Match history</h3>
  ${S.history.length
    ?S.history.map((r,i)=>matchRowHTML(r,i)).join('')
    :`<div class="card center" style="padding:30px 20px">
       <div class="bob" style="display:inline-block">${mascot('sleepy',C.sblue,88)}</div>
       <h3 style="margin-top:10px">No battles yet</h3>
       <div class="muted" style="margin-top:6px">Your duels will pile up here.<br>Go start one — it only takes a minute.</div></div>`}
  ${tabbar('activity')}
</div>`},

challenge(){
  const f=Q._chF,t=Q._chT;
  return `<div class="screen notabs">
  ${headerBack('Challenge a Friend')}
  <div class="muted" style="margin:-4px 0 14px">All friends here are friendly mock blobs — no real messages are sent.</div>
  <h3 style="margin-bottom:10px">Pick a rival</h3>
  ${FRIENDS.map(fr=>`<div class="card sm tap row" style="margin-bottom:9px;${f===fr.id?`background:${C.pink}`:''}" onclick="Q.pickFriend('${fr.id}')">
    ${avatar(fr.color,38,f===fr.id?'competitive':'neutral')}
    <div style="flex:1"><div style="font-weight:900;font-size:.9rem">${fr.name}</div>
      <div class="tiny">Level ${fr.level} · ${fr.status}</div></div>
    ${f===fr.id?'<div style="font-weight:900;color:'+C.green+';font-size:1.2rem">●</div>':''}
  </div>`).join('')}
  <h3 style="margin:16px 0 10px">Pick a topic</h3>
  <div class="tgrid" style="grid-template-columns:1fr 1fr;gap:9px">
    ${TOPICS.map(tp=>`<button class="card sm tap row" style="gap:8px;padding:11px;${t===tp.id?`background:${tp.color}88;box-shadow:1px 1px 0 var(--ink)`:''}"
      onclick="Q.pickChTopic('${tp.id}')">
      <span style="width:20px;height:20px;flex:none"><svg viewBox="0 0 24 24" width="20" height="20">${GLYPHS[tp.acc]}</svg></span>
      <span style="font-weight:900;font-size:.82rem">${tp.name}</span></button>`).join('')}
  </div>
  <button class="btn blue big block" style="margin-top:18px" ${f&&t?'':'disabled'} onclick="Q.sendChallenge()">✈️ Send challenge</button>
  <button class="btn red block" style="margin-top:10px" ${f&&t?'':'disabled'} onclick="Q.battleFriend()">⚡ Battle them right now</button>
</div>`},

daily(){
  const done=dailyDone();
  const mix=[...new Set(dailySet().map(q=>q.tid))].map(T);
  return `<div class="screen notabs">
  ${headerBack('Daily Challenge')}
  <div class="banner" style="background:${C.dgreen};color:#fff">
    <div class="bob" style="display:inline-block">${mascot(done?'proud':'excited',C.dgreen,112,'calendar')}</div>
    <h2 style="margin-top:10px">${done?'Crushed it today!':'One duel. Every day.'}</h2>
    <div style="font-weight:800;font-size:.85rem;opacity:.92;margin-top:6px;line-height:1.45">
      ${done?'Quizzle retreats to plot tomorrow’s questions.':'7 mixed questions vs Quizzle.<br>Finish it to bank +50 XP and feed your streak.'}</div>
    <div class="row" style="justify-content:center;margin-top:12px">${chip('+50 XP',C.yellow)}${chip('🔥 Streak '+S.dailyStreak,C.orange)}</div>
  </div>
  <h3 style="margin:16px 0 10px">In today’s mix</h3>
  <div style="display:flex;flex-wrap:wrap;gap:8px">
    ${mix.map(t=>chip(t.name,t.color+'99')).join('')}
  </div>
  <h3 style="margin:16px 0 10px">Your opponent</h3>
  <div class="card sm row">${avatar(DAILY_BOT.color,42,DAILY_BOT.m)}
    <div><div style="font-weight:900;font-size:.92rem">${DAILY_BOT.name}</div><div class="tiny">${DAILY_BOT.tag}</div></div></div>
  ${done
    ?`<button class="btn white block" style="margin-top:16px" onclick="Q.playDaily()">↻ Replay for fun (no bonus)</button>`
    :`<button class="btn orange big block" style="margin-top:16px" onclick="Q.playDaily()">⚡ Play today’s challenge</button>`}
  <button class="btn white block" style="margin-top:10px" onclick="Q.go('streak')">View streak & badges</button>
</div>`},

streak(){
  const dailyDays=new Set(S.history.filter(r=>r.mode==='daily').map(r=>dkey(new Date(r.date))));
  const now=new Date();const start=new Date(now);start.setDate(now.getDate()-now.getDay());
  const days=[];for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push(d)}
  const labels=['S','M','T','W','T','F','S'];
  return `<div class="screen notabs">
  ${headerBack('Streak & Badges')}
  <div class="card" style="background:${C.yellow}">
    <div class="row">
      <div class="bob">${mascot(S.dailyStreak>0?'excited':'sleepy',C.orange,84,'flame')}</div>
      <div><h1 style="font-size:2rem">${S.dailyStreak} day${S.dailyStreak===1?'':'s'}</h1>
        <div class="tiny">Daily streak · best ${S.bestDailyStreak}</div></div>
    </div>
    <div class="tiny" style="margin-top:10px">${dailyDone()?'Today is banked. See you tomorrow.':'Play today’s daily challenge to keep the flame alive.'}</div>
  </div>
  <h3 style="margin:16px 0 10px">This week</h3>
  <div class="card sm"><div class="week">
    ${days.map((d,i)=>{const k=dkey(d);const hit=dailyDays.has(k);const today=k===todayKey();
      return `<div class="day"><div class="dn">${labels[i]}</div>
        <div class="dc ${hit?'hit':''} ${today?'today':''}">${hit?'🔥':d.getDate()}</div></div>`}).join('')}
  </div></div>
  <h3 style="margin:16px 0 10px">Badges (${S.ach.length}/${ACH.length})</h3>
  <div class="agrid">
    ${ACH.map(a=>`<div class="ach ${S.ach.includes(a.id)?'':'lock'}">
      <div class="abadge">${a.i}</div><div class="an">${a.n}</div><div class="ad">${a.d}</div></div>`).join('')}
  </div>
</div>`},

profile(){return `<div class="screen">
  <div class="topbar"><h2>Profile</h2></div>
  <div class="card center" style="border-radius:26px">
    <div class="bob" style="display:inline-block">${mascot('happy',S.color,104)}</div>
    <div style="margin-top:12px"><input class="namefield" style="-webkit-user-select:text;user-select:text;text-align:center;max-width:240px"
      value="${esc(S.name)}" maxlength="14" onchange="Q.setName(this.value)" /></div>
    <div style="margin-top:14px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">
      ${[C.yellow,C.pink,C.blue,C.green,C.orange,C.purple,C.sblue].map(col=>
        `<span class="swatch ${S.color===col?'sel':''}" style="background:${col}" onclick="Q.setColor('${col}')"></span>`).join('')}
    </div>
  </div>
  <div class="card" style="background:${C.purple}77;margin-top:14px">
    <div class="spread"><h3>Level ${lvl()}</h3><span class="tiny">${lvlInto()}/500 XP</span></div>
    <div class="xpbarwrap" style="margin-top:8px"><div class="xpbar" style="width:${lvlInto()/500*100}%"></div></div>
    <div class="tiny" style="margin-top:7px">Total ${S.xp} XP · ${S.weeklyXP} XP this week</div>
  </div>
  <h3 style="margin:16px 0 10px">Stats</h3>
  <div class="row">${statBox(S.history.length,'Duels')}${statBox(wins(),'Wins')}${statBox(winRate()+'%','Win rate')}</div>
  <div class="row" style="margin-top:10px">${statBox(bestScore(),'Best score')}${statBox(S.dailyStreak,'Streak')}${statBox(S.bestDailyStreak,'Best streak')}</div>
  <h3 style="margin:16px 0 10px">Achievements</h3>
  <div class="agrid">
    ${ACH.slice(0,4).map(a=>`<div class="ach ${S.ach.includes(a.id)?'':'lock'}">
      <div class="abadge">${a.i}</div><div class="an">${a.n}</div><div class="ad">${a.d}</div></div>`).join('')}
  </div>
  <button class="btn white block" style="margin-top:12px" onclick="Q.go('streak')">See all achievements</button>
  <button class="btn red block" style="margin-top:18px" onclick="Q.reset()">🗑 Reset all data</button>
  <p class="tiny center" style="margin-top:14px">Quibble MVP · fully local demo · no account needed</p>
  ${tabbar('profile')}
</div>`},
};

/* ============================== HANDLERS ============================== */

const Q={
  _pick:new Set(), _chF:null, _chT:null,
  go:(s,p)=>go(s,p),
  go2:(s,p)=>{route=Object.assign({s},p||{});render()},
  tab:id=>tabTo(id),
  back:()=>back(),
  togglePick(id){Q._pick.has(id)?Q._pick.delete(id):Q._pick.add(id);render()},
  finishPick(){S.favs=[...Q._pick];S.onboarded=true;save();tabTo('home')},
  quick(){
    const pool=(S.favs.length?S.favs:TOPICS.map(t=>t.id));
    const t=T(pool[Math.floor(Math.random()*pool.length)])||TOPICS[0];
    startMatch('quick',t,BOTS[Math.floor(Math.random()*BOTS.length)],topicSet(t.id));
  },
  playTopic(tid){const t=T(tid);startMatch('topic',t,BOTS[Math.floor(Math.random()*BOTS.length)],topicSet(tid))},
  playDaily(){startMatch('daily',null,DAILY_BOT,S.lastDaily===todayKey()?mixedSet():dailySet())},
  answer:i=>answer(i),
  quit(){if(G&&G.timer){clearInterval(G.timer);G.timer=null}G=null;back()},
  rematch:()=>rematch(),
  reviewLast(){if(G&&G.summary)go('review',{mid:G.summary.rec.id})},
  review(idx){const r=S.history[idx];if(r)go('review',{mid:r.id})},
  pickFriend(id){Q._chF=id;render()},
  pickChTopic(id){Q._chT=id;render()},
  sendChallenge(){
    const f=FRIENDS.find(x=>x.id===Q._chF),t=T(Q._chT);
    if(!f||!t)return;
    S.pending.unshift({id:'p'+Date.now(),fid:f.id,fname:f.name,color:f.color,tid:t.id,tname:t.name,date:Date.now()});
    S.challengesSent++;
    const newly=evalAch();save();
    toast(`Challenge sent to ${f.name}! (demo)`);
    if(newly.length)setTimeout(()=>toast(`Achievement unlocked: ${newly[0].n}!`),2600);
    render();
  },
  battleFriend(){
    const f=FRIENDS.find(x=>x.id===Q._chF),t=T(Q._chT);
    if(!f||!t)return;
    const bot={id:'fr-'+f.id,name:f.name,color:f.color,m:'competitive',
      acc:Math.min(.85,.45+f.level*.03),min:2,max:8,tag:f.status};
    startMatch('friend',t,bot,topicSet(t.id));
  },
  playPending(id){
    const p=S.pending.find(x=>x.id===id);if(!p)return;
    S.pending=S.pending.filter(x=>x.id!==id);save();
    const f=FRIENDS.find(x=>x.id===p.fid),t=T(p.tid);
    if(f&&t){Q._chF=f.id;Q._chT=t.id;Q.battleFriend()}
  },
  dismissPending(id){S.pending=S.pending.filter(x=>x.id!==id);save();render()},
  setName(v){const n=v.trim().slice(0,14);if(n){S.name=n;save()}render()},
  setColor(c){S.color=c;save();render()},
  reset(){if(confirm('Reset everything? This clears your local profile, matches and achievements.')){
    S=freshState();save();Q._pick=new Set();navStack=[];route={s:'welcome'};render()}},
};
window.Q=Q;

/* ============================== ANNOTATION MODE ==============================
   Tap the pencil button, then tap anywhere to leave a design note.
   "Copy notes" produces a text list to paste back into chat. */

const ANNKEY='quibble_ann_v1';
const A={on:false,notes:[]};
try{A.notes=JSON.parse(localStorage.getItem(ANNKEY))||[]}catch(e){}
function saveAnn(){try{localStorage.setItem(ANNKEY,JSON.stringify(A.notes))}catch(e){}}

function annUI(){
  if(!document.querySelectorAll)return;
  document.querySelectorAll('#annbtn,#annlayer,.annpin,#anntools,#annhint').forEach(e=>e.remove());

  const btn=document.createElement('button');
  btn.id='annbtn';btn.textContent=A.on?'✕':'✏️';
  if(A.on)btn.className='on';
  btn.onclick=()=>{A.on=!A.on;annUI()};
  document.body.appendChild(btn);
  if(!A.on)return;

  const layer=document.createElement('div');layer.id='annlayer';
  layer.addEventListener('click',e=>{
    const x=e.clientX/window.innerWidth,y=e.clientY/window.innerHeight;
    const text=prompt('What should change here?');
    if(text&&text.trim()){
      A.notes.push({id:Date.now(),screen:route.s,x,y,text:text.trim()});
      saveAnn();
    }
    annUI();
  });
  document.body.appendChild(layer);

  const hint=document.createElement('div');hint.id='annhint';
  hint.textContent='Annotate: tap anywhere to leave a note · tap a pin to delete it';
  document.body.appendChild(hint);

  A.notes.forEach((n,i)=>{
    if(n.screen!==route.s)return;
    const p=document.createElement('div');p.className='annpin';p.textContent=i+1;
    p.style.left=(n.x*100)+'vw';p.style.top=(n.y*100)+'vh';
    p.onclick=e=>{e.stopPropagation();
      if(confirm('Note '+(i+1)+': “'+n.text+'”\n\nDelete it?')){
        A.notes=A.notes.filter(m=>m.id!==n.id);saveAnn();annUI();
      }};
    document.body.appendChild(p);
  });

  const tools=document.createElement('div');tools.id='anntools';
  const copy=document.createElement('button');
  copy.textContent='📋 Copy '+A.notes.length+' note'+(A.notes.length===1?'':'s');
  copy.onclick=()=>{
    if(!A.notes.length){toast('No notes yet — tap the screen first');return}
    const txt='Quibble feedback ('+todayKey()+')\n'+A.notes.map((n,i)=>
      (i+1)+'. ['+n.screen+' screen — '+Math.round(n.x*100)+'% across, '+Math.round(n.y*100)+'% down] '+n.text).join('\n');
    const done=()=>toast('Copied! Paste it to Claude in chat.');
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(done,()=>prompt('Copy this:',txt));
    }else prompt('Copy this:',txt);
  };
  const clear=document.createElement('button');clear.textContent='🗑';
  clear.onclick=()=>{
    if(A.notes.length&&confirm('Delete all '+A.notes.length+' notes?')){A.notes=[];saveAnn();annUI()}
  };
  tools.appendChild(copy);tools.appendChild(clear);
  document.body.appendChild(tools);
}

/* ============================== BOOT ============================== */

route=S.onboarded?{s:'home'}:{s:'welcome'};
render();
</script>
